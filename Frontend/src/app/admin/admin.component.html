<h2>Admin Dashboard</h2>
<form (ngSubmit)="saveSettings()">
  <label>Voice Tone:
    <select [(ngModel)]="settings.voiceTone" name="voiceTone">
      <option value="educato">Educato</option>
      <option value="simpatico">Simpatico</option>
      <option value="formale">Formale</option>
    </select>
  </label><br>
  <label>Context:
    <textarea [(ngModel)]="settings.context" name="context"></textarea>
  </label><br>
  <label>Max Words:
    <input type="number" [(ngModel)]="settings.maxWords" name="maxWords">
  </label><br>
  <button type="submit">Save Settings</button>
</form>
